<!DOCTYPE html>
<!--
  Blue Ghost Collision — Regression Test Suite
  Open this page in the browser while MAMP is running:
    http://localhost/project/web/test_blue_ghost.html

  Tests verify that the blue ghost (Esprit abyssal) correctly kills the
  player when the player's slide path intersects the ghost's DESTINATION
  portal, even if the ghost is currently invisible (odd->even teleport turn).

  Bug that was fixed:
    _findFirstCollisionOnEnds had `if (!e.g.visible) continue;`
    which checked the ghost's CURRENT visibility instead of END visibility.
    On even turns the blue ghost is currently invisible (e.g.visible=false)
    but WILL be visible at its destination (e.visible=true).
    The old check caused the collision to be silently skipped.

  Fix applied:
    1. Removed `if (!e.g.visible) continue;` from _findFirstCollisionOnEnds
       (e.visible===false already handles the invisible-end case correctly)
    2. Changed `e.g.visible &&` to `e.visible !== false &&` in _handleCollisionAt
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blue Ghost — Regression Tests</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { background:#09122a; color:#e8d9a0; font-family:'Courier New',monospace; padding:24px; }
  h1   { color:var(--gold,#E0B95A); margin-bottom:4px; }
  h2   { color:#aaa; font-size:14px; font-weight:normal; margin-top:0; margin-bottom:24px; }
  #log { max-width:780px; }
  .suite { margin-bottom:28px; }
  .suite-title { font-size:16px; font-weight:bold; color:#c8b870; border-bottom:1px solid #2a3a6a; padding-bottom:4px; margin-bottom:10px; }
  .test  { padding:6px 10px; margin:3px 0; border-radius:4px; font-size:13px; }
  .pass  { background:#0a2a0a; border-left:4px solid #3c3; }
  .fail  { background:#2a0a0a; border-left:4px solid #c33; }
  .icon  { margin-right:8px; font-size:14px; }
  #summary { margin-top:24px; padding:14px 18px; border-radius:6px; font-size:15px; font-weight:bold; }
  #summary.all-pass { background:#0a2a0a; border:2px solid #3c3; color:#6f6; }
  #summary.has-fail  { background:#2a0a0a; border:2px solid #c33; color:#f66; }
  canvas { display:none; }
</style>
</head>
<body>
<h1>👻 Ghost Collision — Regression Tests</h1>
<h2>Verifies all ghost-kills-player collision cases: blue teleport, swap, and post-slide safety net</h2>

<!-- Hidden canvas required by Game constructor -->
<canvas id="c"></canvas>

<div id="log"></div>
<div id="summary"></div>

<script src="js/game.js?v=4"></script>
<script>
'use strict';

// ─── Minimal test harness ────────────────────────────────────────────────────
const log = document.getElementById('log');
let passed = 0, failed = 0;
let currentSuite = null;

function suite(title) {
    const div = document.createElement('div');
    div.className = 'suite';
    const h = document.createElement('div');
    h.className = 'suite-title';
    h.textContent = title;
    div.appendChild(h);
    log.appendChild(div);
    currentSuite = div;
}

function test(label, fn) {
    const div = document.createElement('div');
    div.className = 'test';
    try {
        fn();
        div.classList.add('pass');
        div.innerHTML = `<span class="icon">✓</span>${label}`;
        passed++;
    } catch(err) {
        div.classList.add('fail');
        div.innerHTML = `<span class="icon">✗</span>${label}<br><small style="color:#f99">${err.message}</small>`;
        failed++;
        console.error(label, err);
    }
    (currentSuite || log).appendChild(div);
}

function assert(cond, msg)        { if (!cond) throw new Error(msg || 'assertion failed'); }
function assertEqual(a, b, msg)   { if (a !== b) throw new Error((msg||'expected equal')+` — got ${JSON.stringify(a)}, expected ${JSON.stringify(b)}`); }
function assertNull(v, msg)       { if (v !== null) throw new Error((msg||'expected null')+` — got ${JSON.stringify(v)}`); }
function assertNotNull(v, msg)    { if (v == null) throw new Error(msg || 'expected non-null'); }

// ─── Level factory ───────────────────────────────────────────────────────────
const { Game } = window.OmbrequatreEngine;

/**
 * Minimal level for testing blue ghost collision.
 *
 * 10 cols × 5 rows:
 *   ##########   row 0 — all walls
 *   #P......*#   row 1 — player(1,1), gems(1,2-7), portal-A(1,8)
 *   ##########   row 2 — all walls
 *   #*______B#   row 3 — portal-B(3,1), blue-ghost-start(3,8)
 *   ##########   row 4 — all walls
 *
 * portals (row-major scan) = [[1,8], [3,1]]
 * Blue ghost start position: row=3, col=8
 *
 * Ice-slide RIGHT from (1,1): path (1,1)→(1,2)→…→(1,8) stopping at wall col 9.
 */
function makeGame(opts = {}) {
    const lvl = [
        'W 10',
        'H 5',
        'P 1 1',
        'B 3 8',
        'MAP',
        '##########',
        '#P......*#',
        '##########',
        '#*______B#',
        '##########',
    ].join('\n');

    const canvas = document.getElementById('c');
    const g = new Game(canvas, lvl, opts);
    cancelAnimationFrame(g._raf);
    clearInterval(g._timeTimer);
    return g;
}

// ─── Suite 1: _simulateBlueGhostEnd ──────────────────────────────────────────
suite('_simulateBlueGhostEnd — predict blue ghost destination & visibility');

test('odd teleportCounter (0→1): stays put, visible=false', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    assertNotNull(blue, 'blue ghost exists');

    blue.teleportCounter = 0;   // nextCount = 1 (odd) → disappear
    blue.row = 3; blue.col = 8;

    const end = g._simulateBlueGhostEnd(blue);
    assertEqual(end.visible, false, 'should be invisible on odd turn');
    assertEqual(end.row, 3, 'row should be unchanged');
    assertEqual(end.col, 8, 'col should be unchanged');
});

test('even teleportCounter (1→2): teleports to next portal, visible=true', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');

    blue.teleportCounter = 1;   // nextCount = 2 (even) → teleport & appear
    blue.row = 3; blue.col = 8; // current portal: not found in portals array → idx=-1 → next=0 → portals[0]=[1,8]

    const end = g._simulateBlueGhostEnd(blue);
    assertEqual(end.visible, true, 'should be visible on even turn');
    // portals = [[1,8],[3,1]]; ghost is not at a portal → idx=-1 → next = (-1+1)%2 = 0 → [1,8]
    assertEqual(end.row, 1, 'teleports to portal-A row');
    assertEqual(end.col, 8, 'teleports to portal-A col');
});

test('even teleportCounter from portal-A (1,8): teleports to portal-B (3,1)', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');

    blue.teleportCounter = 1;
    blue.row = 1; blue.col = 8; // at portal-A → idx=0 → next=1 → portals[1]=[3,1]

    const end = g._simulateBlueGhostEnd(blue);
    assertEqual(end.visible, true, 'visible after teleport');
    assertEqual(end.row, 3, 'teleports to portal-B row');
    assertEqual(end.col, 1, 'teleports to portal-B col');
});

// ─── Suite 2: _findFirstCollisionOnEnds ──────────────────────────────────────
suite('_findFirstCollisionOnEnds — collision prediction (core bug fix)');

test('no collision when ghost end is invisible (e.visible=false)', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.state = 'normal';

    // Odd turn: ghost stays at (3,8) but disappears
    const ends = [{ g: blue, r: 3, c: 8, visible: false }];
    // Player path happens to cross (3,8) — but ghost won't be there
    const path = [[3,2],[3,3],[3,4],[3,5],[3,6],[3,7],[3,8]];

    const hit = g._findFirstCollisionOnEnds(path, ends);
    assertNull(hit, 'no collision when ghost end is invisible');
});

test('[BUG FIX] collision detected when e.g.visible=false but e.visible=true', () => {
    // THE KEY TEST: before the fix, this returned null because
    // `if (!e.g.visible) continue` skipped the blue ghost when it was
    // currently invisible, even though it was about to teleport visibly.
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.state   = 'normal';
    blue.visible = false;       // currently invisible (was in odd turn)

    // Even turn: ghost teleports to portal-A at (1,8) → visible=true
    const ends = [{ g: blue, r: 1, c: 8, visible: true }];
    // Player slides right on row 1: (1,1)→(1,2)→…→(1,8)
    const path = [[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[1,8]];

    const hit = g._findFirstCollisionOnEnds(path, ends);
    assertNotNull(hit, 'collision MUST be detected even when e.g.visible=false');
    assertEqual(hit.idx, 7, 'collision at path index 7 (cell 1,8)');
    assert(hit.ghost === blue, 'blue ghost is the colliding ghost');
});

test('collision when ghost is normally visible (regression — non-blue ghosts)', () => {
    const g = makeGame();
    const fakeRed = { type:'red', state:'normal', visible:true };
    const ends = [{ g: fakeRed, r: 1, c: 4 }];  // no visible field (non-blue)
    const path = [[1,1],[1,2],[1,3],[1,4]];

    const hit = g._findFirstCollisionOnEnds(path, ends);
    assertNotNull(hit, 'normal ghost should still cause collision');
    assertEqual(hit.idx, 3, 'collision at path index 3');
    assert(hit.ghost === fakeRed, 'correct ghost');
});

test('defeated ghost is always ignored', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.state = 'defeated';

    const ends = [{ g: blue, r: 1, c: 5, visible: true }];
    const path = [[1,1],[1,2],[1,3],[1,4],[1,5]];

    const hit = g._findFirstCollisionOnEnds(path, ends);
    assertNull(hit, 'defeated ghost must not cause collision');
});

test('first collision on path takes priority over a later one', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.state   = 'normal';
    blue.visible = false;

    const fakeRed = { type:'red', state:'normal', visible:true };
    // Red at col3, blue at col6 (currently invisible but will appear)
    const ends = [
        { g: blue,    r: 1, c: 6, visible: true },
        { g: fakeRed, r: 1, c: 3 },               // no visible field
    ];
    const path = [[1,1],[1,2],[1,3],[1,4],[1,5],[1,6]];

    const hit = g._findFirstCollisionOnEnds(path, ends);
    assertNotNull(hit, 'collision found');
    assertEqual(hit.idx, 2, 'first hit is at index 2 (col 3)');
    assert(hit.ghost === fakeRed, 'red ghost hits first');
});

// ─── Suite 3: _handleCollisionAt ─────────────────────────────────────────────
suite('_handleCollisionAt — triggers _loseLife via e.visible (not e.g.visible)');

test('[BUG FIX] _loseLife called when blue ghost e.visible=true and e.g.visible=false', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.visible = false;   // currently invisible
    blue.state   = 'normal';

    g._turnGhostEnds = [{ g: blue, r: 1, c: 8, visible: true }];
    g._ghostAnims    = [];
    g._slidePath     = [[1,1],[1,8]];
    g._slideStepIdx  = 1;

    let lifeLost = false;
    g._loseLife  = function() { lifeLost = true; };
    g._stopSlide = function() {};

    g._handleCollisionAt(1, 8);
    assert(lifeLost, '_loseLife MUST be called — player hits teleporting ghost');
});

test('_loseLife NOT called when ghost end is invisible (disappearing turn)', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.visible = false;
    blue.state   = 'normal';

    // Ghost is disappearing — end is invisible
    g._turnGhostEnds = [{ g: blue, r: 1, c: 8, visible: false }];
    g._ghostAnims    = [];
    g._slidePath     = [[1,1],[1,8]];
    g._slideStepIdx  = 1;
    g._slideHitIdx   = -1;

    let lifeLost = false;
    g._loseLife      = function() { lifeLost = true; };
    g._stopSlide     = function() {};
    g._finalizeSlide = function() {};

    g._handleCollisionAt(1, 8);
    assert(!lifeLost, 'must NOT lose life when ghost end is invisible');
});

test('_loseLife called for normally-visible non-blue ghost', () => {
    const g = makeGame();
    const fakeRed = { type:'red', state:'normal', visible:true };

    g._turnGhostEnds = [{ g: fakeRed, r: 1, c: 5 }]; // no visible field
    g._ghostAnims    = [];
    g._slidePath     = [[1,1],[1,5]];
    g._slideStepIdx  = 1;

    let lifeLost = false;
    g._loseLife  = function() { lifeLost = true; };
    g._stopSlide = function() {};

    g._handleCollisionAt(1, 5);
    assert(lifeLost, '_loseLife must be called for a normal visible ghost');
});

// ─── Suite 4: _planGhostTurn ─────────────────────────────────────────────────
suite('_planGhostTurn — blue ghost ends include correct visible field');

test('odd turn (teleportCounter=0): ends entry has visible=false', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.teleportCounter = 0;
    blue.row = 3; blue.col = 8;
    blue.visible = true;

    const { ends } = g._planGhostTurn();
    const blueEnd = ends.find(e => e.g.type === 'blue');
    assertNotNull(blueEnd, 'blue ghost end must be present');
    assertEqual(blueEnd.visible, false, 'odd turn: end.visible must be false');
});

test('even turn (teleportCounter=1): ends entry has visible=true', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.teleportCounter = 1;
    blue.row = 3; blue.col = 8;
    blue.visible = false;

    const { ends } = g._planGhostTurn();
    const blueEnd = ends.find(e => e.g.type === 'blue');
    assertNotNull(blueEnd, 'blue ghost end must be present');
    assertEqual(blueEnd.visible, true, 'even turn: end.visible must be true');
});

// ─── Suite 5: swap-case (path[0]) + _finalizeSlide safety net ───────────────
suite('Swap-case & post-slide safety net — green-ghost regression');

test('[BUG FIX] _findFirstCollisionOnEnds detects ghost ending at path[0]', () => {
    // Ghost ends at the player's START cell. _findFirstCollisionOnEnds must
    // detect this (idx=0) so _startTurnSlide can handle it immediately.
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.state = 'normal'; blue.visible = true;

    // Player path: (1,1)→(1,2). Ghost ends at (1,1) = path[0].
    const ends = [{ g: blue, r: 1, c: 1, visible: true }];
    const path = [[1,1],[1,2]];

    const hit = g._findFirstCollisionOnEnds(path, ends);
    assertNotNull(hit, 'must detect ghost at path[0]');
    assertEqual(hit.idx, 0, 'idx must be 0');
    assert(hit.ghost === blue, 'correct ghost');
});

test('[BUG FIX] _startTurnSlide triggers _loseLife when hit.idx===0 (swap)', () => {
    // Simulates: player moves RIGHT, ghost moves LEFT into player's start cell.
    // _slideHitIdx would be 0, which previously was never triggered.
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.state   = 'normal';
    blue.visible = true;
    blue.row = 1; blue.col = 2; // one step to the right of player start (1,1)

    // Teleport counter to odd → ghost stays put (simplifies test — we manually
    // force the ghost end by directly injecting _turnGhostEnds in _planGhostTurn)
    // Instead, just verify _startTurnSlide behavior by monkey-patching _findFirstCollisionOnEnds
    let lifeLost = false;
    g._loseLife  = function() { lifeLost = true; };

    // Force _findFirstCollisionOnEnds to return hit.idx=0
    g._findFirstCollisionOnEnds = function() { return { idx: 0, ghost: blue }; };
    g._computeSlidePath = function() { return [[1,1],[1,2],[1,3]]; };

    g._startTurnSlide('R');
    assert(lifeLost, '_loseLife MUST be called when _slideHitIdx===0 (swap case)');
});

test('[BUG FIX] _finalizeSlide safety net triggers _loseLife when ghost on player cell', () => {
    // After all slide animation, a ghost is at the player's final position.
    // The safety net in _finalizeSlide must detect this.
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.state   = 'normal';
    blue.visible = true;

    // Put player at (1,3) and blue ghost at the same cell
    g.player.row = 1; g.player.col = 3;
    blue.row     = 1; blue.col     = 3;

    let lifeLost = false;
    g._loseLife  = function() { lifeLost = true; };
    g._stopSlide = function() {};  // neutralize

    g._finalizeSlide(false);
    assert(lifeLost, '_finalizeSlide safety net must call _loseLife');
});

test('[BUG FIX] _finalizeSlide safety net eats frightened ghost (player survives)', () => {
    const g = makeGame();
    const blue = g.ghosts.find(gh => gh.type === 'blue');
    blue.state   = 'frightened';
    blue.visible = true;

    g.player.row = 1; g.player.col = 3;
    blue.row     = 1; blue.col     = 3;

    let lifeLost = false;
    g._loseLife  = function() { lifeLost = true; };
    g._stopSlide = function() {};

    g._finalizeSlide(false);
    assert(!lifeLost, 'player must NOT lose life against frightened ghost');
    assertEqual(blue.state, 'defeated', 'frightened ghost becomes defeated');
});

// ─── Summarize ───────────────────────────────────────────────────────────────
const summary = document.getElementById('summary');
summary.className = failed === 0 ? 'all-pass' : 'has-fail';
summary.textContent = failed === 0
    ? `✓ All ${passed} tests passed — all ghost collision fixes are working correctly`
    : `✗ ${failed} test(s) failed, ${passed} passed`;
</script>
</body>
</html>
